name: Compilar APK desde ZIP

on:
  push:
    paths:
      - "*.zip"
      - "incoming/*.zip"
      - ".github/workflows/compilar_zip.yml"
  workflow_dispatch:

jobs:
  compilar:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repo
        uses: actions/checkout@v4

      - name: Buscar ZIP
        run: |
          ZIP_FILE=$(find . -maxdepth 2 -type f -iname "*.zip" | sort | tail -n 1)

          if [ -z "$ZIP_FILE" ]; then
            echo "ERROR: No se encontró ningún archivo ZIP."
            echo "Sube el ZIP del proyecto en la raíz del repositorio."
            exit 1
          fi

          echo "ZIP_FILE=$ZIP_FILE" >> $GITHUB_ENV
          echo "ZIP encontrado: $ZIP_FILE"

      - name: Descomprimir ZIP
        run: |
          rm -rf temp_zip
          mkdir temp_zip
          unzip -o "$ZIP_FILE" -d temp_zip

      - name: Buscar proyecto Android
        run: |
          PROJECT_DIR=$(find temp_zip -name "settings.gradle" -exec dirname {} \; | head -n 1)

          if [ -z "$PROJECT_DIR" ]; then
            echo "ERROR: No se encontró settings.gradle dentro del ZIP."
            echo "El ZIP debe contener el proyecto Android completo."
            exit 1
          fi

          echo "PROJECT_DIR=$PROJECT_DIR" >> $GITHUB_ENV
          echo "Proyecto Android encontrado: $PROJECT_DIR"

      - name: Copiar proyecto
        run: |
          rsync -a "$PROJECT_DIR"/ ./

      - name: Instalar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Instalar Android SDK
        uses: android-actions/setup-android@v3

      - name: Instalar Gradle limpio
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'
          cache-disabled: true

      - name: Verificar Gradle
        run: |
          gradle --version

      - name: Compilar APK
        run: |
          gradle assembleDebug

      - name: Subir APK
        uses: actions/upload-artifact@v4
        with:
          name: Geo-Susu-APK
          path: app/build/outputs/apk/debug/app-debug.apk
