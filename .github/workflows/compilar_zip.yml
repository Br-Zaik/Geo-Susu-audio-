name: Compilar APK desde ZIP

on:
  push:
    paths:
      - "*.zip"
      - "incoming/*.zip"
  workflow_dispatch:

jobs:
  compilar:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repo
        uses: actions/checkout@v4

      - name: Buscar ZIP
        run: |
          ZIP_FILE=$(ls -t *.zip incoming/*.zip 2>/dev/null | head -n 1)
          echo "ZIP_FILE=$ZIP_FILE" >> $GITHUB_ENV
          echo "ZIP encontrado: $ZIP_FILE"

      - name: Descomprimir ZIP
        run: |
          rm -rf temp_zip
          mkdir temp_zip
          unzip -o "$ZIP_FILE" -d temp_zip

      - name: Buscar proyecto Android
        run: |
          PROJECT_DIR=$(find temp_zip -name "settings.gradle" -exec dirname {} \; | head -n 1)
          echo "PROJECT_DIR=$PROJECT_DIR" >> $GITHUB_ENV
          echo "Proyecto: $PROJECT_DIR"

      - name: Copiar proyecto
        run: |
          rsync -a "$PROJECT_DIR"/ ./

      - name: Instalar Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Instalar Android SDK
        uses: android-actions/setup-android@v3

      - name: Instalar Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'

      - name: Compilar APK
        run: gradle assembleDebug

      - name: Subir APK
        uses: actions/upload-artifact@v4
        with:
          name: Geo-Susu-Audio-APK
          path: app/build/outputs/apk/debug/app-debug.apk
