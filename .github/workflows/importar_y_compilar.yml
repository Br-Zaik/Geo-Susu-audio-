name: Importar ZIP y compilar APK

on:
  push:
    paths:
      - "incoming/*.zip"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  importar-compilar:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repo
        uses: actions/checkout@v4

      - name: Buscar ZIP
        run: |
          ZIP_FILE=$(ls -t incoming/*.zip | head -n 1)
          echo "ZIP_FILE=$ZIP_FILE" >> $GITHUB_ENV

      - name: Descomprimir ZIP
        run: |
          rm -rf temp_zip
          mkdir temp_zip
          unzip -o "$ZIP_FILE" -d temp_zip

      - name: Copiar proyecto al repo
        run: |
          PROJECT_DIR=$(find temp_zip -name "settings.gradle" -exec dirname {} \; | head -n 1)

          if [ -z "$PROJECT_DIR" ]; then
            echo "ERROR: No se encontró settings.gradle dentro del ZIP"
            exit 1
          fi

          rsync -a --exclude='.git' --exclude='.github' --exclude='incoming' "$PROJECT_DIR"/ ./

      - name: Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Android SDK
        uses: android-actions/setup-android@v3

      - name: Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'

      - name: Compilar APK
        run: gradle assembleDebug

      - name: Guardar cambios del proyecto
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add . ':!incoming/*.zip'
          git commit -m "Importar proyecto Android desde ZIP" || echo "Sin cambios"
          git push

      - name: Subir APK lista
        uses: actions/upload-artifact@v4
        with:
          name: Geo-Susu-Audio-APK
          path: app/build/outputs/apk/debug/app-debug.apk
