name: Leer ZIP de respuestas

on:
  push:
    paths:
      - "incoming/*.zip"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  leer-zip:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Buscar ultimo ZIP
        run: |
          ZIP_FILE=$(ls -t incoming/*.zip | head -n 1)
          echo "ZIP_FILE=$ZIP_FILE" >> $GITHUB_ENV

      - name: Descomprimir ZIP
        run: |
          rm -rf temp_zip
          mkdir temp_zip
          unzip -o "$ZIP_FILE" -d temp_zip

      - name: Copiar respuestas.json
        run: |
          mkdir -p data
          FILE=$(find temp_zip -name "respuestas.json" | head -n 1)

          if [ -z "$FILE" ]; then
            echo "ERROR: El ZIP no contiene respuestas.json"
            exit 1
          fi

          cp "$FILE" data/respuestas.json

      - name: Guardar cambios
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/respuestas.json
          git commit -m "Actualizar respuestas desde ZIP" || echo "Sin cambios"
          git push
